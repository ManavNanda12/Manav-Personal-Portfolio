<section id="certifications" class="certs-section">
  <div class="section-inner">
    <div class="section-header reveal">
      <span class="section-eyebrow">// Credentials</span>
      <h2 class="section-title">Certs &amp; <em>Education</em></h2>
      <div class="divider"></div>
    </div>

    <div class="certs-grid">
      <div *ngFor="let c of certs; let i = index"
           class="cert-card reveal"
           [style.transition-delay]="(i * 0.05) + 's'">
        <div class="cert-icon">{{ c.icon }}</div>
        <div class="cert-name">{{ c.name }}</div>
        <div class="cert-issuer">{{ c.org }}</div>
      </div>

      <div *ngFor="let e of edu" class="cert-card reveal edu-card">
        <div class="cert-icon">{{ e.icon }}</div>
        <div class="cert-name">{{ e.degree }} — {{ e.cgpa }} CGPA</div>
        <div class="cert-issuer">{{ e.college }}, {{ e.year }}</div>
      </div>
    </div>
  </div>
</section>
