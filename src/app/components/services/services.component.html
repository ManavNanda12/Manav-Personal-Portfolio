<section id="services" class="services-section">
  <div class="section-inner">
    <div class="section-header reveal">
      <span class="section-eyebrow">// What I Offer</span>
      <h2 class="section-title">My <em>Services</em></h2>
      <div class="divider"></div>
      <p class="section-desc">What I bring to every engagement — from architecture to deployment.</p>
    </div>

    <div class="services-grid">
      <div *ngFor="let s of services; let i = index"
           class="service-card reveal"
           [style.transition-delay]="(i * 0.05) + 's'">
        <div class="service-num">{{ s.num }}</div>
        <div class="service-icon">{{ s.icon }}</div>
        <h3 class="service-title">{{ s.title }}</h3>
        <p class="service-desc">{{ s.desc }}</p>
      </div>
    </div>
  </div>
</section>
