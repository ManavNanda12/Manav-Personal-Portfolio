<!-- ── Custom cursor ── -->
<div class="cursor-dot"
  [style.left.px]="cursorX"
  [style.top.px]="cursorY">
</div>
<div class="cursor-ring"
  [style.left.px]="ringX"
  [style.top.px]="ringY"
  [class.cursor-hover]="isCursorHover">
</div>

<!-- ── Scroll progress ── -->
<div class="scroll-progress" [style.width.%]="scrollProgress"></div>

<!-- ── Grid overlay ── -->
<div class="grid-overlay"></div>

<!-- ── Navigation ── -->
<app-nav></app-nav>

<!-- ── Page sections ── -->
<main>
  <app-hero></app-hero>
  <app-marquee></app-marquee>
  <app-about></app-about>
  <app-experience></app-experience>
  <app-projects></app-projects>
  <app-certifications></app-certifications>
  <app-services></app-services>
  <app-testimonials></app-testimonials>
  <app-contact></app-contact>
</main>

<app-footer></app-footer>

<!-- ── Back to top ── -->
<a *ngIf="showBackToTop" href="#hero" class="back-to-top" title="Back to top">↑</a>

<!-- ── Toast ── -->
<div class="toast" [class.toast--show]="showToast">
  ✅ Message sent! Manav will get back to you soon.
</div>

<!-- ══════════════════════════════════════════
     CHATBOT FAB + PANEL
     ══════════════════════════════════════════ -->
<div class="chatbot-wrapper" [class.chatbot-wrapper--open]="isChatOpen">

  <!-- Panel — rendered above the FAB -->
  @if (isChatOpen) {
    <app-chatbot [@chatPanel]></app-chatbot>
  }

  <!-- Floating Action Button -->
  <button
    class="chatbot-fab"
    [class.chatbot-fab--active]="isChatOpen"
    (click)="toggleChat()"
    [attr.aria-label]="isChatOpen ? 'Close chat' : 'Open chat with MN.AI'">

    <!-- Robot icon (shown when closed) -->
    <span class="fab-icon" [class.fab-icon--hidden]="isChatOpen">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
        <rect x="16" y="20" width="32" height="24" rx="6" fill="currentColor"/>
        <rect x="22" y="27" width="8"  height="7" rx="2" fill="#080812"/>
        <rect x="34" y="27" width="8"  height="7" rx="2" fill="#080812"/>
        <rect x="28" y="38" width="8"  height="3" rx="1.5" fill="#080812"/>
        <rect x="30" y="12" width="4"  height="8" rx="2" fill="currentColor"/>
        <circle cx="32" cy="10" r="3" fill="currentColor"/>
        <rect x="8"  y="28" width="6" height="10" rx="3" fill="currentColor"/>
        <rect x="50" y="28" width="6" height="10" rx="3" fill="currentColor"/>
      </svg>
    </span>

    <!-- Close / X icon (shown when open) -->
    <span class="fab-icon" [class.fab-icon--hidden]="!isChatOpen">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/>
        <line x1="6"  y1="6" x2="18" y2="18"/>
      </svg>
    </span>

    <!-- Notification dot — pulsing when closed to attract attention -->
    <span class="fab-dot" *ngIf="!isChatOpen"></span>
  </button>

  <!-- Tooltip label (shown when closed) -->
  <span class="fab-tooltip" *ngIf="!isChatOpen">Ask MN.AI</span>

</div>
