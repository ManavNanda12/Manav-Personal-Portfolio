<section id="contact" class="contact-section">
  <div class="section-inner">
    <div class="section-header reveal">
      <span class="section-eyebrow">// Get In Touch</span>
      <h2 class="section-title">Let's <em>work together</em></h2>
      <div class="divider"></div>
      <p class="section-desc">I'm open to new opportunities, freelance projects, and interesting collaborations. Let's talk.</p>
    </div>

    <div class="contact-grid">
      <div class="contact-info reveal">
        <ng-container *ngFor="let c of contacts">
          <a *ngIf="c.href"
             [href]="c.href"
             [target]="c.href.startsWith('http') ? '_blank' : ''"
             rel="noreferrer"
             class="contact-item">
            <span class="ci-icon">{{ c.icon }}</span>
            <div>
              <div class="ci-label">{{ c.label }}</div>
              <div class="ci-value">{{ c.value }}</div>
            </div>
          </a>
          <div *ngIf="!c.href" class="contact-item contact-item-plain">
            <span class="ci-icon">{{ c.icon }}</span>
            <div>
              <div class="ci-label">{{ c.label }}</div>
              <div class="ci-value">{{ c.value }}</div>
            </div>
          </div>
        </ng-container>
      </div>

      <form class="contact-form reveal" (ngSubmit)="onSubmit()" style="transition-delay:0.12s">
        <div class="form-row">
          <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" [(ngModel)]="form.name" name="name" placeholder="John Doe" required>
          </div>
          <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" [(ngModel)]="form.email" name="email" placeholder="john@example.com" required>
          </div>
        </div>
        <div class="form-group">
          <label for="subject">Subject</label>
          <input id="subject" type="text" [(ngModel)]="form.subject" name="subject" placeholder="Project collaboration...">
        </div>
        <div class="form-group">
          <label for="message">Message</label>
          <textarea id="message" [(ngModel)]="form.message" name="message" rows="5" placeholder="Tell me about your project..." required></textarea>
        </div>
        <button type="submit" class="btn-primary">Send Message →</button>
      </form>
    </div>
  </div>

  <div *ngIf="showToast" class="toast toast-show">
    ✅ Message sent! I'll get back to you soon.
  </div>
</section>
